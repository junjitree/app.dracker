<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#14121f"/>
      <stop offset="100%" stop-color="#0a0910"/>
    </radialGradient>
    <linearGradient id="stroke" x1="140" y1="120" x2="380" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b7bff"/>
      <stop offset="55%" stop-color="#6a5cff"/>
      <stop offset="100%" stop-color="#4a3ce0"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g>
    <!-- tracker tag body -->
    <circle cx="256" cy="268" r="150" stroke="url(#stroke)" stroke-width="10"/>

    <!-- top attachment ring -->
    <circle cx="256" cy="118" r="17" fill="#0a0910" stroke="url(#stroke)" stroke-width="10"/>

    <!-- simplified QR: just the three finder patterns -->
    <g fill="url(#stroke)">
      <rect x="170.40" y="182.40" width="51.36" height="51.36" rx="14" fill="none" stroke="url(#stroke)" stroke-width="10"/>
      <rect x="183.24" y="195.24" width="25.68" height="25.68" rx="8"/>
      <rect x="290.24" y="182.40" width="51.36" height="51.36" rx="14" fill="none" stroke="url(#stroke)" stroke-width="10"/>
      <rect x="303.08" y="195.24" width="25.68" height="25.68" rx="8"/>
      <rect x="170.40" y="302.24" width="51.36" height="51.36" rx="14" fill="none" stroke="url(#stroke)" stroke-width="10"/>
      <rect x="183.24" y="315.08" width="25.68" height="25.68" rx="8"/>

      <!-- a few larger data modules to hint at the QR without the clutter -->
      <rect x="252.23" y="252.23" width="25.68" height="25.68" rx="7"/>
      <rect x="320.71" y="252.23" width="25.68" height="25.68" rx="7"/>
      <rect x="286.47" y="286.47" width="25.68" height="25.68" rx="7"/>
      <rect x="252.23" y="320.71" width="25.68" height="25.68" rx="7"/>
      <rect x="320.71" y="320.71" width="25.68" height="25.68" rx="7"/>
    </g>
  </g>
</svg>
