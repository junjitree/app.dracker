name: CI/CD

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - run: pnpm lint

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Create .env
        run: |
          echo "APP_ENV=production" >> .env
          echo "APP_NAME=Dracker" >> .env
          echo "API_URL=https://api.dracker.sh" >> .env
          echo "CLT_URL=https://app.dracker.sh" >> .env

      - run: pnpm build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan vultr.teppelin.io >> ~/.ssh/known_hosts

      - name: Rsync to server
        run: rsync -avz --delete dist/spa/ root@vultr.teppelin.io:/apps/app.dracker/dist/_spa/
